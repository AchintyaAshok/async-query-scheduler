receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  spanmetrics:
    metrics_exporter: prometheus

exporters:
  otlp/tempo:
    endpoint: tempo:3200
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: app

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, spanmetrics]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
